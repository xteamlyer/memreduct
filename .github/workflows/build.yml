name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  SOLUTION_FILE_PATH: .

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    continue-on-error: true

    steps:
    - name: Check out main repo
      uses: actions/checkout@v4.1.4

    - name: Clone routine
      run: git clone https://github.com/henrypp/routine.git ../routine

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@main

    - name: Build ARM64
      run: msbuild /m /p:Configuration=Release /p:Platform=ARM64 ${{env.SOLUTION_FILE_PATH}}

    - name: Build x64
      run: msbuild /m /p:Configuration=Release /p:Platform=x64 ${{env.SOLUTION_FILE_PATH}}

    - name: Build x86
      run: msbuild /m /p:Configuration=Release /p:Platform=x86 ${{env.SOLUTION_FILE_PATH}}

    # - name: Upload ARM64
    #   uses: actions/upload-artifact@v4.3.3
    #   with:
    #     name: memreduct-ARM64
    #     path: ${{env.SOLUTION_FILE_PATH}}/bin/ARM64/*

    # - name: Upload x64
    #   uses: actions/upload-artifact@v4.3.3
    #   with:
    #     name: memreduct-x64
    #     path: ${{env.SOLUTION_FILE_PATH}}/bin/64/*

    # - name: Upload x86
    #   uses: actions/upload-artifact@v4.3.3
    #   with:
    #     name: memreduct-x86
    #     path: ${{env.SOLUTION_FILE_PATH}}/bin/32/*

    - name: Archive ARM64
      uses: thedoctor0/zip-release@main
      with:
        type: 'zip'
        path: ${{env.SOLUTION_FILE_PATH}}/bin/ARM64/*
        filename: 'memreduct-ARM64.zip'

    - name: Archive x64
      uses: thedoctor0/zip-release@main
      with:
        type: 'zip'
        path: ${{env.SOLUTION_FILE_PATH}}/bin/64/*
        filename: 'memreduct-x64.zip'

    - name: Archive x86
      uses: thedoctor0/zip-release@main
      with:
        type: 'zip'
        path: ${{env.SOLUTION_FILE_PATH}}/bin/32/*
        filename: 'memreduct-x86.zip'

    - name: Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        name: "Nightly"
        prerelease: true
        generate_release_notes: true
        make_latest: true
        files: |
          memreduct-ARM64.zip
          memreduct-x64.zip
          memreduct-x86.zip